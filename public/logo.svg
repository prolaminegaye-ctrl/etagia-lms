<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" width="220" height="64">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5722"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFA5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Sun icon — stylized "E" as rising sun -->
  <circle cx="22" cy="32" r="10" fill="url(#sunGrad)"/>
  <!-- Sun rays -->
  <line x1="22" y1="10" x2="22" y2="15" stroke="#FFB300" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="49" x2="22" y2="54" stroke="#FF5722" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="32" x2="9" y2="32" stroke="#FF5722" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="32" x2="40" y2="32" stroke="#FFB300" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="9.5" y1="17.5" x2="13" y2="21" stroke="#FF7043" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="43" x2="34.5" y2="46.5" stroke="#FF7043" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="9.5" y1="46.5" x2="13" y2="43" stroke="#FFB300" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="21" x2="34.5" y2="17.5" stroke="#FFB300" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "tagia" wordmark -->
  <text x="50" y="40"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    fill="#F5F0E8"
    letter-spacing="-0.5">tagia</text>

  <!-- LMS pill -->
  <rect x="50" y="47" width="52" height="13" rx="6.5" fill="url(#tealGrad)" opacity="0.9"/>
  <text x="76" y="57"
    font-family="'Plus Jakarta Sans', Arial, sans-serif"
    font-size="8"
    font-weight="800"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="3">LMS</text>
</svg>
