<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="260" height="64">
  <defs>
    <linearGradient id="sunG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8651A"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <linearGradient id="lmsG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFA5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Sun icon -->
  <circle cx="22" cy="28" r="9" fill="url(#sunG)"/>
  <line x1="22" y1="8"  x2="22" y2="14" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="42" x2="22" y2="48" stroke="#E8651A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2"  y1="28" x2="8"  y2="28" stroke="#E8651A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="28" x2="42" y2="28" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8"  y1="14" x2="12" y2="18" stroke="#E8651A" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="36" x2="34" y2="40" stroke="#E8651A" stroke-width="2" stroke-linecap="round"/>
  <line x1="8"  y1="40" x2="12" y2="36" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="18" x2="34" y2="14" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>

  <!-- "Etagia" full wordmark — warm cream on dark sidebar -->
  <text x="52" y="38"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="700"
    fill="#F5F0E8"
    letter-spacing="-0.5">Etagia</text>

  <!-- LMS pill -->
  <rect x="52" y="44" width="52" height="14" rx="7" fill="url(#lmsG)" opacity="0.85"/>
  <text x="78" y="54.5"
    font-family="Arial, sans-serif"
    font-size="8"
    font-weight="800"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="3.5">LMS</text>
</svg>
