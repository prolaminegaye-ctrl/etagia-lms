server {
    listen 80;
    server_name kolibri.etagia-academie.com;   # Remplacer par ton sous-domaine

    # ── CORS pour ETAGIA ──────────────────────────────────────────────────────
    add_header 'Access-Control-Allow-Origin' 'https://www.etagia-academie.com' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    # ── Proxy vers Kolibri ────────────────────────────────────────────────────
    location / {
        proxy_pass http://kolibri:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming vidéo (important pour les grandes vidéos)
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 0;

        # Preflight CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://www.etagia-academie.com';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ── Servir les fichiers contenus directement (performances) ──────────────
    location /content/ {
        proxy_pass http://kolibri:8080/content/;
        proxy_buffering off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
